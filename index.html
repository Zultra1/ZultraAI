<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zultra AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f13;
            --glass-bg: rgba(30, 30, 35, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #e056fd;
            --accent-hover: #c83be4;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top left, rgba(224, 86, 253, 0.1), transparent 40%);
            color: var(--text-main);
            display: flex;
            height: 100vh;
        }

        /* Sidebar - Matches Account Dashboard */
        .sidebar {
            width: 260px;
            background: var(--glass-bg);
            border-right: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
        }

        .brand {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #4facfe 0%, var(--accent) 100%);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }

        .nav-link {
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .nav-link.active {
            background: rgba(224, 86, 253, 0.15);
            color: var(--accent);
            font-weight: 500;
        }

        .spacer { flex-grow: 1; }

        /* Chat Area */
        .chat-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            position: relative;
        }

        .chat-history {
            flex-grow: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .input-area {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(20px);
        }

        .input-area input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .send-btn {
            background: var(--accent);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .send-btn:hover { background: var(--accent-hover); transform: scale(1.05); }

        /* Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; justify-content: center; align-items: center;
            z-index: 9999; font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-spinner fa-spin"></i> &nbsp; Checking Access...</div>

    <div class="sidebar">
        <div class="brand">
            <div class="brand-icon">Z</div> Zultra AI
        </div>
        
        <div style="color: var(--text-muted); font-size: 12px; margin-bottom: 10px; padding-left: 10px;">RECENT CHATS</div>
        <div class="spacer"></div>
        
        <a href="https://account.zultra.cloud" class="nav-link"><i class="fas fa-cloud"></i> Zultra Cloud</a>
        <a href="https://zultramediaplayer.zultra.cloud" class="nav-link"><i class="fas fa-play"></i> Media Player</a>
    </div>

    <div class="chat-container">
        <div class="chat-history" id="chat-box">
            </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Message Gemini...">
            <button class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqhm6v1epzDxuMGYhd-7t_FPS-1ugF6sc",
            authDomain: "zultra-media-player.firebaseapp.com",
            projectId: "zultra-media-player",
            storageBucket: "zultra-media-player.firebasestorage.app",
            messagingSenderId: "1089626227358",
            appId: "1:1089626227358:web:04721377413acf100cf18f",
            measurementId: "G-YKLDV9NRSC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Check if user is allowed here
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in, let them use the app
                document.getElementById('loader').style.display = 'none';
            } else {
                // Kick them back to login
                window.location.href = "https://account.zultra.cloud"; 
            }
        });
    </script>
</body>
</html>

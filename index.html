<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zultra AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f13;
            --glass-bg: rgba(30, 30, 35, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #e056fd;
            --accent-hover: #c83be4;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top left, rgba(224, 86, 253, 0.1), transparent 40%);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        /* --- LOGIN SCREEN OVERLAY --- */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 50% -20%, rgba(224, 86, 253, 0.15), transparent 60%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 24px 40px rgba(0,0,0,0.4);
        }

        .auth-card h2 { margin: 0 0 8px; font-weight: 600; }
        .auth-card p { color: var(--text-muted); font-size: 14px; margin: 0 0 30px; }
        
        .auth-card input {
            width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 14px 16px; color: white; font-size: 15px;
            box-sizing: border-box; outline: none; margin-bottom: 16px;
        }
        .auth-card input:focus { border-color: var(--accent); }
        
        .auth-card button {
            width: 100%; background: var(--accent); color: white; border: none;
            border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .auth-card button:hover { background: var(--accent-hover); }

        /* --- MAIN APP INTERFACE (Hidden by default) --- */
        #app-interface {
            display: none; /* Hidden until logged in */
            height: 100%;
            width: 100%;
            display: flex;
        }

        .sidebar {
            width: 260px; background: var(--glass-bg); border-right: 1px solid var(--glass-border);
            backdrop-filter: blur(20px); display: flex; flex-direction: column; padding: 30px 20px;
        }

        .brand { font-size: 24px; font-weight: 700; margin-bottom: 40px; display: flex; align-items: center; gap: 12px; }
        .brand-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #4facfe 0%, var(--accent) 100%); border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 18px; }

        .nav-link { padding: 12px 16px; border-radius: 12px; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; cursor: pointer; }
        .nav-link:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-main); }
        .spacer { flex-grow: 1; }

        .chat-container { flex-grow: 1; display: flex; flex-direction: column; padding: 40px; }
        .chat-history { flex-grow: 1; overflow-y: auto; padding-bottom: 20px; }
        .input-area { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 10px 20px; display: flex; align-items: center; gap: 15px; backdrop-filter: blur(20px); }
        .input-area input { flex-grow: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; }
        .send-btn { background: var(--accent); border: none; width: 40px; height: 40px; border-radius: 50%; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="auth-card">
            <div class="brand-icon" style="margin: 0 auto 24px;">Z</div>
            <h2>Zultra AI</h2>
            <p>Sign in with your Zultra ID to continue.</p>
            <input type="email" id="ai-email" placeholder="Email Address">
            <input type="password" id="ai-password" placeholder="Password">
            <button onclick="loginToApp()">Sign In</button>
            <p style="margin-top: 20px; font-size: 12px;">Need an account? <a href="https://account.zultra.cloud" style="color: var(--accent); text-decoration: none;">Create one here</a></p>
        </div>
    </div>

    <div id="app-interface" style="display: none;">
        <div class="sidebar">
            <div class="brand">
                <div class="brand-icon">Z</div> Zultra AI
            </div>
            
            <div class="spacer"></div>
            
            <a href="https://account.zultra.cloud" class="nav-link"><i class="fas fa-cloud"></i> Zultra Cloud</a>
            <a href="https://zultramediaplayer.zultra.cloud" class="nav-link"><i class="fas fa-play"></i> Media Player</a>
            <a onclick="logoutOfApp()" class="nav-link" style="color: #ff453a;"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
        </div>

        <div class="chat-container">
            <div class="chat-history">
                </div>
            <div class="input-area">
                <input type="text" placeholder="Message Gemini...">
                <button class="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqhm6v1epzDxuMGYhd-7t_FPS-1ugF6sc",
            authDomain: "zultra-media-player.firebaseapp.com",
            projectId: "zultra-media-player",
            storageBucket: "zultra-media-player.firebasestorage.app",
            messagingSenderId: "1089626227358",
            appId: "1:1089626227358:web:04721377413acf100cf18f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Check if they are already logged in to this specific app
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Hide Login, Show App
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-interface').style.display = 'flex';
            } else {
                // Show Login, Hide App
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('app-interface').style.display = 'none';
            }
        });

        // Login Button Function
        window.loginToApp = function() {
            const email = document.getElementById('ai-email').value;
            const pass = document.getElementById('ai-password').value;
            
            signInWithEmailAndPassword(auth, email, pass).catch((error) => {
                alert("Login failed: " + error.message);
            });
        };

        // Logout Button Function
        window.logoutOfApp = function() {
            signOut(auth);
        };
    </script>
</body>
</html>
